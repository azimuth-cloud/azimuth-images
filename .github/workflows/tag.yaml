---
name: Promote image manifest

permissions:
  contents: write

on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - "**"

jobs:
  publish_release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install s3cmd
        run: |
          sudo apt-get update -y
          sudo apt-get install -y s3cmd

      - name: Download manifest for commit
        run: ./bin/download-manifest
        env:
          MANIFEST_FILE: manifest.json
          S3_HOST: ${{ vars.CLOUDFLARE_S3_HOST }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.CLOUDFLARE_S3_SECRET_KEY }}

      - name: Publish release with manifest
        run: |
          # Fail if release already exists
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release for $TAG_NAME already exists. Releases are immutable."
            exit 1
          else
            echo "Creating release for $TAG_NAME"
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes \
              manifest.json
          fi
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
