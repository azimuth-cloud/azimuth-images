---
name: Build and test PR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:  # yamllint disable-line rule:truthy
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
    branches:
      - main

jobs:
  # This job exists so that PRs from outside the main repo are rejected
  fail_on_remote:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: PR must be from a branch in the azimuth-cloud/azimuth-images repo
        run: |
          if [ "${{ github.repository }}" != "azimuth-cloud/azimuth-images" ]; then
            exit 1
          fi

  lint:
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read
      packages: write
      statuses: write
    needs:
      - fail_on_remote

  # Build, publish and test the images
  build_test_images:
    needs:
      - fail_on_remote
      - lint
    # Don't build draft PRs
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/build_test_images.yaml
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write  # required to get an OIDC token for signing
      security-events: write  # required to upload SARIF files
    secrets:
      OS_CLOUDS: ${{ secrets.OS_CLOUDS }}
      CLOUDFLARE_S3_ACCESS_KEY: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY }}
      CLOUDFLARE_S3_SECRET_KEY: ${{ secrets.CLOUDFLARE_S3_SECRET_KEY }}

  # Purge the manifest and images that we just tested from S3
  purge_images:
    needs:
      - build_test_images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install s3cmd
        run: |
          sudo apt-get update -y
          sudo apt-get install -y s3cmd

      - name: Purge tested images from S3
        run: ./bin/purge-manifest "${GITHUB_SHA}.manifest"
        env:
          S3_HOST: ${{ vars.CLOUDFLARE_S3_HOST }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.CLOUDFLARE_S3_SECRET_KEY }}
